name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/backend/package-lock.json

    - name: Install dependencies
      working-directory: ./services/backend
      run: npm ci

    - name: Run linting
      working-directory: ./services/backend
      run: npm run lint

    - name: Run tests
      working-directory: ./services/backend
      run: npm test
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: ecommerce_test
        DB_USER: postgres
        DB_PASSWORD: testpassword
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-jwt-secret-for-ci-only

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./services/backend/coverage/lcov.info
        flags: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./services/frontend
      run: npm ci

    - name: Run linting
      working-directory: ./services/frontend
      run: npm run lint

    - name: Run tests
      working-directory: ./services/frontend
      run: npm test

    - name: Build application
      working-directory: ./services/frontend
      run: npm run build

  test-worker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/worker/package-lock.json

    - name: Install dependencies
      working-directory: ./services/worker
      run: npm ci

    - name: Run linting
      working-directory: ./services/worker
      run: npm run lint

    - name: Run tests
      working-directory: ./services/worker
      run: npm test
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PASSWORD: testpassword
        REDIS_HOST: localhost

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe  # v0.28.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push-images:
    needs: [test-backend, test-frontend, test-worker, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      backend-image: ${{ steps.backend-meta.outputs.tags }}
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
      worker-image: ${{ steps.worker-meta.outputs.tags }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for backend
      id: backend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./services/backend
        push: true
        tags: ${{ steps.backend-meta.outputs.tags }}
        labels: ${{ steps.backend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Extract metadata for frontend
      id: frontend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./services/frontend
        push: true
        tags: ${{ steps.frontend-meta.outputs.tags }}
        labels: ${{ steps.frontend-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Extract metadata for worker
      id: worker-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push worker image
      uses: docker/build-push-action@v5
      with:
        context: ./services/worker
        push: true
        tags: ${{ steps.worker-meta.outputs.tags }}
        labels: ${{ steps.worker-meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  integration-tests:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install backend dependencies
      working-directory: ./services/backend
      run: npm ci

    - name: Start backend service
      working-directory: ./services/backend
      run: node src/index.js &
      env:
        NODE_ENV: test
        PORT: 8080
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: ecommerce_test
        DB_USER: postgres
        DB_PASSWORD: testpassword
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: integration-test-jwt-secret
        ALLOWED_ORIGINS: http://localhost:3000

    - name: Wait for backend to be ready
      run: |
        echo "Waiting for backend..."
        for i in $(seq 1 20); do
          curl -sf http://localhost:8080/health && echo "Backend ready" && break
          echo "Attempt $i failed, retrying..."
          sleep 3
        done
        curl -sf http://localhost:8080/health || (echo "Backend never became ready" && exit 1)

    - name: Install Artillery
      run: npm install -g artillery@latest

    - name: Run API integration tests
      run: artillery run tests/integration/api-test.yml

    - name: Run load tests
      run: artillery run tests/load/load-test.yml

  deploy-staging:
    needs: [build-and-push-images, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
    - uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

    - name: Deploy to staging with Kustomize
      run: |
        # Update image tags in kustomization overlay
        cd kubernetes/overlays/staging
        kustomize edit set image \
          ecommerce-backend=${{ needs.build-and-push-images.outputs.backend-image }} \
          ecommerce-frontend=${{ needs.build-and-push-images.outputs.frontend-image }} \
          ecommerce-worker=${{ needs.build-and-push-images.outputs.worker-image }}
        kustomize build . | kubectl apply -f -

        kubectl rollout status deployment/backend -n ecommerce --timeout=300s
        kubectl rollout status deployment/frontend -n ecommerce --timeout=300s
        kubectl rollout status deployment/worker -n ecommerce --timeout=300s

    - name: Run smoke tests
      run: |
        kubectl port-forward svc/backend-service 8080:8080 -n ecommerce &
        sleep 5
        curl -sf http://localhost:8080/health || exit 1
        curl -sf http://localhost:8080/api/products || exit 1
        echo "Staging smoke tests passed"

  deploy-production:
    needs: [build-and-push-images, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

    - name: Deploy to production with Kustomize
      run: |
        cd kubernetes/overlays/production
        kustomize edit set image \
          ecommerce-backend=${{ needs.build-and-push-images.outputs.backend-image }} \
          ecommerce-frontend=${{ needs.build-and-push-images.outputs.frontend-image }} \
          ecommerce-worker=${{ needs.build-and-push-images.outputs.worker-image }}
        kustomize build . | kubectl apply -f -

        kubectl rollout status deployment/backend -n ecommerce --timeout=600s
        kubectl rollout status deployment/frontend -n ecommerce --timeout=600s
        kubectl rollout status deployment/worker -n ecommerce --timeout=600s

    - name: Run production smoke tests
      run: |
        kubectl port-forward svc/backend-service 8080:8080 -n ecommerce &
        sleep 5
        curl -sf http://localhost:8080/health       || exit 1
        curl -sf http://localhost:8080/api/products || exit 1
        echo "Production smoke tests passed"

    - name: Notify deployment success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: ":white_check_mark: Production deployment successful! Commit: ${{ github.sha }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify deployment failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: ":x: Production deployment failed! Commit: ${{ github.sha }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
