name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/backend/package-lock.json

    - name: Install dependencies
      working-directory: ./services/backend
      run: npm ci

    - name: Run linting
      working-directory: ./services/backend
      run: npm run lint

    - name: Run tests
      working-directory: ./services/backend
      run: npm test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./services/backend/coverage/lcov.info
        flags: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./services/frontend
      run: npm ci

    - name: Run linting
      working-directory: ./services/frontend
      run: npm run lint

    - name: Run tests
      working-directory: ./services/frontend
      run: npm test

    - name: Build application
      working-directory: ./services/frontend
      run: npm run build

  test-worker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: services/worker/package-lock.json

    - name: Install dependencies
      working-directory: ./services/worker
      run: npm ci

    - name: Run linting
      working-directory: ./services/worker
      run: npm run lint

    - name: Run tests
      working-directory: ./services/worker
      run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push-images:
    needs: [test-backend, test-frontend, test-worker, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      backend-image: ${{ steps.backend.outputs.image }}
      frontend-image: ${{ steps.frontend.outputs.image }}
      worker-image: ${{ steps.worker.outputs.image }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for backend
      id: backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./services/backend
        push: true
        tags: ${{ steps.backend.outputs.tags }}
        labels: ${{ steps.backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata for frontend
      id: frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./services/frontend
        push: true
        tags: ${{ steps.frontend.outputs.tags }}
        labels: ${{ steps.frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata for worker
      id: worker
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push worker image
      uses: docker/build-push-action@v5
      with:
        context: ./services/worker
        push: true
        tags: ${{ steps.worker.outputs.tags }}
        labels: ${{ steps.worker.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  integration-tests:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install test dependencies
      run: npm install -g artillery

    - name: Run API integration tests
      run: |
        artillery run tests/integration/api-test.yml

    - name: Run load tests
      run: |
        artillery run tests/load/load-test.yml

  deploy-staging:
    needs: [build-and-push-images, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to staging
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update image tags in deployment manifests
        sed -i "s|image: ecommerce-backend:.*|image: ${{ needs.build-and-push-images.outputs.backend-image }}|g" kubernetes/manifests/backend.yaml
        sed -i "s|image: ecommerce-frontend:.*|image: ${{ needs.build-and-push-images.outputs.frontend-image }}|g" kubernetes/manifests/frontend.yaml
        sed -i "s|image: ecommerce-worker:.*|image: ${{ needs.build-and-push-images.outputs.worker-image }}|g" kubernetes/manifests/worker.yaml
        
        # Apply manifests
        kubectl apply -f kubernetes/manifests/namespace.yaml
        kubectl apply -f kubernetes/manifests/secrets.yaml
        kubectl apply -f kubernetes/manifests/configmaps.yaml
        
        # Wait for services to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/backend -n ecommerce
        kubectl wait --for=condition=available --timeout=300s deployment/frontend -n ecommerce
        kubectl wait --for=condition=available --timeout=300s deployment/worker -n ecommerce

    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get svc backend-service -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].ip}:8080')
        FRONTEND_URL=$(kubectl get svc frontend-service -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].ip}:3000')
        
        # Run smoke tests
        curl -f $BACKEND_URL/health || exit 1
        curl -f $FRONTEND_URL/health || exit 1

  deploy-production:
    needs: [build-and-push-images, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to production (Blue-Green)
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update image tags
        sed -i "s|image: ecommerce-backend:.*|image: ${{ needs.build-and-push-images.outputs.backend-image }}|g" kubernetes/manifests/backend.yaml
        sed -i "s|image: ecommerce-frontend:.*|image: ${{ needs.build-and-push-images.outputs.frontend-image }}|g" kubernetes/manifests/frontend.yaml
        sed -i "s|image: ecommerce-worker:.*|image: ${{ needs.build-and-push-images.outputs.worker-image }}|g" kubernetes/manifests/worker.yaml
        
        # Deploy to green environment
        kubectl apply -f kubernetes/manifests/namespace.yaml
        kubectl apply -f kubernetes/manifests/secrets.yaml
        kubectl apply -f kubernetes/manifests/configmaps.yaml
        
        # Rolling update with max surge
        kubectl apply -f kubernetes/manifests/postgres.yaml
        kubectl apply -f kubernetes/manifests/redis.yaml
        kubectl apply -f kubernetes/manifests/backend.yaml
        kubectl apply -f kubernetes/manifests/frontend.yaml
        kubectl apply -f kubernetes/manifests/worker.yaml
        
        # Wait for rollout
        kubectl rollout status deployment/backend -n ecommerce --timeout=600s
        kubectl rollout status deployment/frontend -n ecommerce --timeout=600s
        kubectl rollout status deployment/worker -n ecommerce --timeout=600s

    - name: Run production smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get svc backend-service -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].ip}:8080')
        FRONTEND_URL=$(kubectl get svc frontend-service -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].ip}:3000')
        
        # Run comprehensive smoke tests
        curl -f $BACKEND_URL/health || exit 1
        curl -f $FRONTEND_URL/health || exit 1
        curl -f $BACKEND_URL/metrics || exit 1
        
        # Test API endpoints
        curl -f $BACKEND_URL/api/products || exit 1
        curl -f $BACKEND_URL/api/health/detailed || exit 1

    - name: Notify deployment success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "✅ Production deployment successful! Commit: ${{ github.sha }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify deployment failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "❌ Production deployment failed! Commit: ${{ github.sha }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}