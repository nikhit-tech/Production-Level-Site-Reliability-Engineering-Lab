---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ecommerce
  labels:
    app: worker
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: worker
        image: ecommerce-worker:latest
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "ecommerce"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-password
        - name: SMTP_HOST
          value: "localhost"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USER
          value: ""
        - name: SMTP_PASS
          value: ""
        - name: ENABLE_METRICS_SERVER
          value: "true"
        - name: METRICS_PORT
          value: "3002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        readinessProbe:
          httpGet:
            path: "/health"
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: "/health"
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      imagePullSecrets: []
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: ecommerce
  labels:
    app: worker
spec:
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: worker
  type: ClusterIP
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: inventory-check
  namespace: ecommerce
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: inventory-check
            image: ecommerce-worker:latest
            command: ["/bin/sh", "-c"]
            args:
            - |
              node -e "
                const { Pool } = require('pg');
                const pool = new Pool({
                  host: 'postgres-service',
                  user: process.env.DB_USER,
                  password: process.env.DB_PASSWORD,
                  database: 'ecommerce',
                  port: 5432
                });
                pool.query('SELECT id, name, stock_quantity FROM products WHERE stock_quantity < 10 ORDER BY stock_quantity ASC')
                  .then(result => {
                    console.log('Low stock items:', result.rows);
                    process.exit(0);
                  })
                  .catch(err => {
                    console.error('Error checking inventory:', err);
                    process.exit(1);
                  });
              "
            env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          restartPolicy: OnFailure
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: ecommerce
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker