---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ecommerce
type: Opaque
data:
  # Base64 encoded values
  # echo -n 'postgres' | base64 -> cG9zdGdyZXM=
  db-password: cG9zdGdyZXM=
  # echo -n 'redispassword' | base64 -> cmVkaXNwYXNzd29yZA==
  redis-password: cmVkaXNwYXNzd29yZA==
  # echo -n 'your-super-secret-jwt-key-change-in-production' | base64 -> eW91ci1zdXBlci1zZWNyZXQtand0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
  jwt-secret: eW91ci1zdXBlci1zZWNyZXQtand0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ecommerce
type: Opaque
data:
  # echo -n 'postgres' | base64
  postgres-user: cG9zdGdyZXM=
  # echo -n 'password' | base64
  postgres-password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: ecommerce
type: Opaque
data:
  # echo -n 'redispassword' | base64
  redis-password: cmVkaXNwYXNzd29yZA==
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
data:
  # echo -n 'admin' | base64
  admin-user: YWRtaW4=
  # echo -n 'admin' | base64
  admin-password: YWRtaW4=